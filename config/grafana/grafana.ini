[server]
http_port = 3000

[security]
admin_user = admin
admin_password = admin

[analytics]
reporting_enabled = false

[users]
allow_sign_up = false

[dashboards]
default_home_dashboard_path = /etc/grafana/dashboards/ntn_overview.json

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[paths]
provisioning = /etc/grafana/provisioning 